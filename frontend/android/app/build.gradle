apply plugin: 'com.android.application'

android {
    namespace "com.priceapi.admin"
    compileSdk rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.priceapi.admin"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        def appVersionCode = project.findProperty("APP_VERSION_CODE") ?: System.getenv("APP_VERSION_CODE") ?: "1"
        def appVersionName = project.findProperty("APP_VERSION_NAME") ?: System.getenv("APP_VERSION_NAME") ?: "1.0"

        versionCode appVersionCode.toString().toInteger()
        versionName appVersionName.toString()
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
                if (project.hasProperty('MYAPP_RELEASE_STORE_FILE')) {
                    storeFile file(MYAPP_RELEASE_STORE_FILE)
                    storePassword System.getenv("SIGNING_STORE_PASSWORD")
                    keyAlias System.getenv("SIGNING_KEY_ALIAS")
                    keyPassword System.getenv("SIGNING_KEY_PASSWORD")
                }
            }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
        debug {
            applicationIdSuffix ".debug"
        }
    }

    applicationVariants.all { variant ->
        variant.outputs.all { output ->
            def formattedDate = new Date().format('yyMMdd-HHmm')
            def versionName = variant.versionName.replace('-debug-' + formattedDate, '') // Remove debug suffix
            def buildType = variant.buildType.name
            
            if (output.outputFile.name.endsWith('.apk')) {
                outputFileName = "pl-price-${versionName}-${formattedDate}.apk"
            }
        }
    }
}

// Rename AAB files after build
task renameAabFiles {
    doLast {
        def releaseAab = file("app/build/outputs/bundle/release/app-release.aab")
        def debugAab = file("app/build/outputs/bundle/debug/app-debug.aab")
        
        if (releaseAab.exists()) {
            def formattedDate = new Date().format('yyMMdd-HHmm')
            def versionName = project.hasProperty('APP_VERSION_NAME') ? 
                project.property('APP_VERSION_NAME') : "2.0.23"
            def newName = "pl-price-${versionName}-${formattedDate}.aab"
            def renamedFile = new File(releaseAab.parent, newName)
            releaseAab.renameTo(renamedFile)
            println "Renamed release AAB to: ${renamedFile.name}"
        }
        
        if (debugAab.exists()) {
            def formattedDate = new Date().format('yyMMdd-HHmm')
            def versionName = project.hasProperty('APP_VERSION_NAME') ? 
                project.property('APP_VERSION_NAME') : "2.0.23"
            def newName = "pl-price-${versionName}-${formattedDate}-debug.aab"
            def renamedFile = new File(debugAab.parent, newName)
            debugAab.renameTo(renamedFile)
            println "Renamed debug AAB to: ${renamedFile.name}"
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
